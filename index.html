<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
</head>
<body>
    <form action="#" method="post" novalidate>
        <fieldset>
            <legend>Personal Information</legend>
            <div>
                <label for="fullName">Full Name :</label>
                <input type="text" id="fullName" required minlength="10" maxlength="30" name="fullName">
            </div><br>
            <div>
                <label for="email">Email :</label>
                <input type="email" id="email" required name="Email" autocomplete="on">
            </div><br>
            <div>
                <label for="password">Password :</label>
                <input type="password" id="password" required minlength="8">
            </div><br>
            <div>
                <label for="phone">Phone :</label>
                <input type="tel" id="phone" required placeholder="Enter your Phone">
            </div><br>
            <div>
                <label for="website">Website :</label>
                <input type="url" id="website">
            </div><br>
            <div>
                <label for="birth">Birth Date :</label>
                <input type="date" id="birth" min="01-01-1990" max="01-01-2015">
            </div><br>
            <div>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </div><br>
            <div>
                <label for="newsletter">Subscribe</label>
                <input type="checkbox" id="newsletter">
            </div><br>
            <div>
                <label>Choose a country</label>
                <select name="country">
                    <option value="eg">Egypt</option>
                    <option value="us">USA</option>
                    <option value="uk">UK</option>
                </select>
            </div><br>
            <div>
                <label>Choose your Fav. Language</label>
                <input list="language" name="language">
                <datalist id="language">
                    <option value="Arabic"></option>
                    <option value="English"></option>
                    <option value="Frence"></option>
                </datalist>
            </div><br>
             <div>
                <input type="submit">
                <input type="reset">
            </div>
        </fieldset>
    </form>
</body>
</html>
